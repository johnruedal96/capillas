services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: capillas
      POSTGRES_PASSWORD: capillas_piloto
      POSTGRES_DB: capillas
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capillas"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://capillas:capillas_piloto@db:5432/capillas
      OPENROUTER_API_KEY: sk-or-v1-{api}
      OPENROUTER_MODEL: openrouter/free
      CORS_ORIGINS: "*"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  model_cache:
