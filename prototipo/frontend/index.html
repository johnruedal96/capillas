<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capillas de la Fe — Asistente Comercial</title>
<style>
  :root {
    --primary: #2c3e50;
    --primary-light: #34495e;
    --accent: #3498db;
    --success: #27ae60;
    --warning: #f39c12;
    --danger: #e74c3c;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #dcdde1;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .header {
    background: var(--primary); color: white; padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header span { font-size: 13px; opacity: 0.8; }
  .tabs {
    display: flex; background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 24px; gap: 0;
  }
  .tab {
    padding: 14px 24px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-light); border-bottom: 2px solid transparent;
    transition: all 0.2s; user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .content { display: none; padding: 20px; max-width: 960px; margin: 0 auto; }
  .content.active { display: block; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }

  /* Chat */
  #chat-history { min-height: 300px; max-height: 50vh; overflow-y: auto; margin-bottom: 16px; }
  .msg { margin-bottom: 12px; display: flex; gap: 8px; }
  .msg.user { justify-content: flex-end; }
  .msg .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5;
  }
  .msg.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #eef2f7; border-bottom-left-radius: 4px; }
  .msg.error .bubble { background: #fde8e8; color: var(--danger); }
  .msg .sources {
    font-size: 12px; color: var(--text-light); margin-top: 4px;
  }
  .msg .sources span { display: inline-block; margin-right: 8px; }
  .typing {
    display: inline-flex; gap: 4px; padding: 4px 0;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-light);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing span:nth-child(1) { animation-delay: -0.32s; }
  .typing span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; outline: none;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .chat-input-row button {
    padding: 10px 20px; background: var(--accent); color: white; border: none;
    border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500;
  }
  .chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Documents */
  .upload-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
  .upload-form .field { flex: 1; min-width: 140px; }
  .upload-form label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-light); }
  .upload-form input, .upload-form select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px;
  }
  .upload-form button {
    padding: 8px 20px; background: var(--success); color: white; border: none;
    border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500;
    height: 36px;
  }
  .upload-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; color: var(--text-light); font-size: 12px; text-transform: uppercase; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .badge.ready { background: #e8f8f0; color: var(--success); }
  .badge.processing { background: #fef3e2; color: var(--warning); }
  .badge.error { background: #fde8e8; color: var(--danger); }
  .btn-icon {
    background: none; border: none; cursor: pointer; color: var(--danger); font-size: 16px;
    padding: 4px 8px; border-radius: 4px;
  }
  .btn-icon:hover { background: #fde8e8; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
  .empty-state p { margin-top: 8px; font-size: 14px; }
  #toast {
    position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius);
    color: white; font-size: 14px; font-weight: 500; transition: opacity 0.3s;
    opacity: 0; pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: 1; }
  #toast.success { background: var(--success); }
  #toast.error { background: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  <div>
    <h1>Capillas de la Fe</h1>
    <span>Asistente Comercial — Prototipo</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
  <div class="tab" onclick="switchTab('docs')">📋 Documentos</div>
</div>

<div id="tab-chat" class="content active">
  <div class="card">
    <div id="chat-history">
      <div class="msg assistant">
        <div class="bubble">¡Hola! Soy el asistente comercial de Capillas de la Fe. Puedes preguntarme sobre planes, coberturas, precios y más. ¿En qué puedo ayudarte?</div>
      </div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="chat-btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>
</div>

<div id="tab-docs" class="content">
  <div class="card">
    <h3 style="margin-bottom:12px;font-size:15px;">Subir documento</h3>
    <form class="upload-form" onsubmit="uploadDocument(event)">
      <div class="field">
        <label>Archivo (PDF, DOCX, MD)</label>
        <input type="file" id="file-input" accept=".pdf,.docx,.md,.txt" required>
      </div>
      <div class="field">
          <label>Categoría</label>
          <select id="category-select">
            <option value="planes">Planes</option>
            <option value="clientes">Clientes</option>
            <option value="objeciones">Objeciones</option>
            <option value="playbooks">Playbooks</option>
            <option value="reglas">Reglas</option>
            <option value="general">General</option>
          </select>
        </div>
        <div class="field" style="flex-basis:100%;">
          <label>Etiquetas (opcional, separadas por coma)</label>
          <input type="text" id="tags-input" placeholder="adulto mayor, 55+, plan familiar, tercera edad, edad minima:55, edad maxima:75">
        </div>
        <button type="submit" id="upload-btn">Subir</button>
    </form>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px;font-size:15px;">Documentos cargados</h3>
    <div id="documents-list"><div class="empty-state">📂 <p>Carga tu primer documento para empezar.</p></div></div>
  </div>
</div>

<div id="toast"></div>

<script>
let loading = false;
let currentStream = null;
let chatHistory = [];

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'docs') loadDocuments();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const history = document.getElementById('chat-history');
  const btn = document.getElementById('chat-btn');
  const q = input.value.trim();
  if (!q || loading) return;

  input.value = ''; loading = true; btn.disabled = true;

  history.insertAdjacentHTML('beforeend', `<div class="msg user"><div class="bubble">${escapeHtml(q)}</div></div>`);
  const msgDiv = document.createElement('div'); msgDiv.className = 'msg assistant';
  msgDiv.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  history.appendChild(msgDiv);
  history.scrollTop = history.scrollHeight;
  chatHistory.push({ role: 'user', content: q });

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, messages: chatHistory }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let answer = '';
    let sourcesHtml = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      buffer = buffer.replace(/\r\n/g, '\n');
      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        const match = part.match(/^event:\s*(.+)\ndata:\s*(.+)$/m);
        if (!match) continue;
        const ev = match[1], data = JSON.parse(match[2]);

        if (ev === 'token') {
          answer += data.content;
          const bubble = msgDiv.querySelector('.bubble');
          bubble.innerHTML = marked(answer);
        } else if (ev === 'sources') {
          if (data.content.length > 0) {
            sourcesHtml = '<div class="sources">📄 Fuentes: ' +
              data.content.map(s => `<span>${s.source} (${(s.similarity*100).toFixed(0)}%)</span>`).join('') +
              '</div>';
          }
        } else if (ev === 'error') {
          msgDiv.className = 'msg error';
          const bubble = msgDiv.querySelector('.bubble');
          bubble.innerHTML = '<strong>⚠️</strong> ' + data.content;
          answer = null;
        } else if (ev === 'presidio') {
          if (data.content.entities_found > 0) {
            sourcesHtml += '<div class="sources" style="color:#e67e22;">🔒 Datos personales filtrados automáticamente</div>';
          }
        }
      }
    }
    if (answer !== null) {
      const bubble = msgDiv.querySelector('.bubble');
      bubble.innerHTML = marked(answer) + sourcesHtml;
      chatHistory.push({ role: 'assistant', content: answer });
    }
    history.scrollTop = history.scrollHeight;
  } catch(e) {
    const bubble = msgDiv.querySelector('.bubble');
    msgDiv.className = 'msg error';
    bubble.innerHTML = '<strong>⚠️ Error:</strong> ' + e.message;
  }
  loading = false; btn.disabled = false;
}

async function loadDocuments() {
  const container = document.getElementById('documents-list');
  try {
    const resp = await fetch('/api/documents');
    const data = await resp.json();
    if (data.total === 0) {
      container.innerHTML = '<div class="empty-state">📂 <p>Carga tu primer documento para empezar.</p></div>';
      return;
    }
    let html = '<table><thead><tr><th>Archivo</th><th>Tipo</th><th>Categoría</th><th>Chunks</th><th>Estado</th><th>Fecha</th><th></th></tr></thead><tbody>';
    for (const d of data.documents) {
      html += `<tr>
        <td><strong>${escapeHtml(d.original_filename)}</strong></td>
        <td>${d.content_type.includes('pdf') ? 'PDF' : d.content_type.includes('docx') ? 'DOCX' : 'MD'}</td>
        <td><span class="badge ready">${d.category}</span></td>
        <td>${d.chunk_count}</td>
        <td><span class="badge ${d.status}">${d.status}</span></td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td><button class="btn-icon" onclick="deleteDoc('${d.id}')" title="Eliminar">🗑️</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div class="empty-state" style="color:var(--danger)">⚠️ <p>Error al cargar documentos: ${e.message}</p></div>`;
  }
}

async function uploadDocument(e) {
  e.preventDefault();
  const file = document.getElementById('file-input').files[0];
  const category = document.getElementById('category-select').value;
  const btn = document.getElementById('upload-btn');
  if (!file) return;
  btn.disabled = true; btn.textContent = 'Subiendo...';

  const tags = document.getElementById('tags-input').value.trim();
  const metadata = tags ? JSON.stringify({tags: tags.split(',').map(t => t.trim()).filter(Boolean)}) : '{}';
  const form = new FormData();
  form.append('file', file);
  form.append('category', category);
  form.append('metadata', metadata);

  try {
    const resp = await fetch('/api/documents/upload', { method: 'POST', body: form });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || 'Error'); }
    const data = await resp.json();
    showToast(`✅ ${file.name} procesado (${data.chunk_count} chunks)`, 'success');
    document.getElementById('file-input').value = '';
    document.getElementById('tags-input').value = '';
    loadDocuments();
  } catch(e) {
    showToast(`❌ ${e.message}`, 'error');
  }
  btn.disabled = false; btn.textContent = 'Subir';
}

async function deleteDoc(id) {
  if (!confirm('¿Eliminar este documento y sus chunks?')) return;
  try {
    const resp = await fetch(`/api/documents/${id}`, { method: 'DELETE' });
    if (!resp.ok) throw new Error('Error');
    showToast('🗑️ Documento eliminado', 'success');
    loadDocuments();
  } catch(e) {
    showToast('❌ Error al eliminar', 'error');
  }
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function marked(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

loadDocuments();
</script>
</body>
</html>
